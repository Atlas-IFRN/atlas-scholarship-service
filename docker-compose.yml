version: '3.8'

services:
  scholarship:
    container_name: scholarship_service
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - atlas_net

networks:
  atlas_net:
    external: true
